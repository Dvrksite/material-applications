name: Continuous Deployment 3.11

on:
  push:
    branches:
      - main  # убедись, что твоя ветка называется так же

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./3.11
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mtuci-final-app:latest